<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>How Your Engine Works — Run Flow</title>
<style>
  :root {
    --bg: #0e1116; --bg-soft:#161b22; --card:#1b212b; --card-hi:#232b38;
    --line:#2b3442; --text:#e8edf4; --muted:#9aa7b8; --faint:#6b7787;
    --accent:#6ea8fe; --accent-soft:#1d2a44; --green:#58c98a; --amber:#e3b341;
    --pink:#e06c9f; --purple:#b08cf0;
    --ax-wellbeing:#58c98a; --ax-engagement:#6ea8fe; --ax-clarity:#e3b341; --ax-growth:#b08cf0;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; max-width:100%; }
  html, body { margin:0; padding:0; height:100%; -webkit-text-size-adjust:100%; }
  body {
    background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.5; -webkit-font-smoothing:antialiased; font-size:16px;
    overflow:hidden; touch-action:none;
  }

  .app { position:fixed; inset:0; display:flex; flex-direction:column; height:100dvh; overflow:hidden; }

  .appbar {
    flex:0 0 auto; text-align:center;
    padding:calc(10px + env(safe-area-inset-top,0px)) 16px 10px;
    background:#11151c; border-bottom:1px solid var(--line);
  }
  .appbar .t { font-size:16px; font-weight:800; }
  .appbar .s { font-size:11.5px; color:var(--muted); }

  .deck { position:relative; flex:1 1 auto; min-height:0; }
  .card {
    position:absolute; inset:0; display:flex; flex-direction:column;
    padding:14px 16px calc(10px + env(safe-area-inset-bottom,0px));
    opacity:0; visibility:hidden; transition:opacity .18s ease;
  }
  .card:target { opacity:1; visibility:visible; z-index:2; }
  /* show the first card when nothing is targeted yet */
  .deck:not(:has(:target)) #c0 { opacity:1; visibility:visible; z-index:2; }

  .cardtop { flex:0 0 auto; }
  .cardtop .step { font-size:11px; letter-spacing:.08em; text-transform:uppercase; font-weight:700; color:var(--faint); }
  .cardtop h2 { margin:3px 0 4px; font-size:21px; line-height:1.2; }
  .cardtop .one { margin:0; font-size:14px; color:var(--muted); }

  .cardbody { flex:1 1 auto; min-height:0; overflow-y:auto; -webkit-overflow-scrolling:touch; padding-top:10px; }

  .chips { display:flex; flex-wrap:wrap; gap:6px; margin:0 0 10px; }
  .chip { font-size:11.5px; padding:3px 9px; border-radius:99px; border:1px solid var(--line); color:var(--muted); }
  .chip.in { border-color:#2e4a3a; color:#8fd8ad; }
  .chip.out { border-color:#2e3f5c; color:#9cc0ff; }

  .box { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px; margin-bottom:10px; }
  .box .lab { font-size:10.5px; text-transform:uppercase; letter-spacing:.07em; font-weight:700; margin-bottom:6px; }
  .box.plain .lab { color:var(--green); }
  .box.prompt .lab { color:var(--purple); }
  .box.data .lab { color:var(--accent); }
  .box p { margin:0; font-size:14px; color:var(--text); }
  .box .file { font-size:10.5px; color:var(--faint); font-family:ui-monospace,monospace; margin-bottom:6px; }
  pre {
    margin:0; font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    font-size:12px; line-height:1.5; color:#d6e2f0;
    white-space:pre-wrap; word-break:break-word; overflow:hidden;
  }
  .json-key{color:#9cc0ff;} .json-str{color:#8fd8ad;} .json-num{color:#e3b341;}

  /* axes strip (overview) */
  .axes { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin:6px 0 12px; }
  .axis { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:10px 6px; text-align:center; }
  .axis .n { font-size:10.5px; color:var(--muted); text-transform:uppercase; }
  .axis .v { font-size:22px; font-weight:800; }
  .axis .m { height:5px; border-radius:99px; background:#2a3442; margin-top:6px; overflow:hidden; }
  .axis .m span { display:block; height:100%; border-radius:99px; }

  /* nav */
  .nav { flex:0 0 auto; display:flex; align-items:center; gap:10px; padding-top:10px; border-top:1px solid var(--line); margin-top:6px; }
  .navbtn {
    flex:0 0 auto; text-decoration:none; font-size:15px; font-weight:700;
    color:#cfe0ff; background:var(--accent-soft); border:1px solid #34507f;
    border-radius:11px; padding:11px 16px; min-height:46px; display:flex; align-items:center;
  }
  .navbtn.next { margin-left:auto; }
  .navbtn.off { opacity:.3; pointer-events:none; }
  .dots { flex:1 1 auto; display:flex; justify-content:center; gap:7px; flex-wrap:wrap; }
  .dots a { width:9px; height:9px; border-radius:99px; background:#36404f; }
  .dots a.on { background:var(--accent); transform:scale(1.25); }

  .note { font-size:13px; color:var(--muted); margin-top:4px; }
  .note b { color:var(--text); }
</style>
</head>
<body>

<div class="app">
  <div class="appbar">
    <div class="t">⚙️ How your engine works</div>
    <div class="s">One real run · tap <b>Next ›</b> to move</div>
  </div>
  <div class="deck" id="deck"></div>
</div>

<script>
const AXES = [
  { n:"Wellbeing",  v:0, c:"--ax-wellbeing" },
  { n:"Engagement", v:1, c:"--ax-engagement" },
  { n:"Clarity",    v:1, c:"--ax-clarity" },
  { n:"Growth",     v:5, c:"--ax-growth" },
];

const pj = o => JSON.stringify(o, null, 2);

// Card 0 is the overview. Cards 1..7 are the stages.
const STAGES = [
  {
    emoji:"📝", step:"Step 1 — Start", title:"Your notes go in",
    one:"You tell it who the meeting's with and what's on your mind.",
    cin:["Name & role","Meeting type","Your notes"], cout:["Context"],
    plain:"Just what you typed. This short note is the seed for everything that follows.",
    data:pj({ name:"Toby", role:"Expert UX Designer", meetingType:"Growth & career plan",
              notes:"Wants to be a lead but his communication is weak" }),
    dataLab:"What you typed"
  },
  {
    emoji:"🎯", step:"Step 2 — Stage 01", title:"Find the focus points",
    one:"It picks the 2–5 topics actually worth talking about.",
    cin:["Your notes"], cout:["Focus points"],
    plain:"Reads your note and asks: what really matters for this person today? A short list — each tagged from your note ('signal') or 'best practice'.",
    prompt:"Sero, prep-notes assistant. Surface the few topics worth this 1:1 — not a checklist.",
    file:"prompts/generate-focus-points.md",
    data:pj({ focus_points:[
      { label:"Communication for a lead role", source:"signal" },
      { label:"Skills for the step up", source:"best_practice" },
      { label:"Feedback on his potential", source:"best_practice" }
    ]}),
    dataLab:"What it returns"
  },
  {
    emoji:"🧭", step:"Step 3 — Stage 01b", title:"Write your prep briefing",
    one:"A quick game-plan so you walk in grounded.",
    cin:["Focus points"], cout:["Briefing"],
    plain:"Before any questions, it hands you a one-glance briefing: the core issue, an opener you can say word-for-word, what to listen for, and a good outcome.",
    prompt:"Sero, prep assistant. Give a tight, practical briefing so the manager walks in grounded.",
    file:"prompts/preparation.md",
    data:pj({
      coreIssue:"Comms skills Toby needs to become a lead.",
      openingQuestion:"What communication challenges have you faced lately?",
      listenFor:["does he own it","has a plan","had feedback"],
      goodOutcome:"Agree one comms skill to work on this quarter."
    }),
    dataLab:"The briefing"
  },
  {
    emoji:"👋", step:"Step 4 — Stage 02", title:"Line up intro questions",
    one:"A few warm-ups, fixed per meeting type — no AI needed.",
    cin:["Meeting type"], cout:["Intro queue"],
    plain:"Not every step needs the model. The opening questions are hand-written per meeting type and simply loaded in.",
    data:pj({ aliases:[
      "q_open_most_like_yourself",
      "q_intro_agenda_check",
      "q_intro_growth_direction"
    ]}),
    dataLab:"Loaded openers"
  },
  {
    emoji:"💡", step:"Step 5 — Stage 03", title:"Generate the question bank",
    one:"8–12 tailored questions built around the focus points.",
    cin:["Focus points","Your notes"], cout:["Question bank"],
    plain:"It designs the real questions for this person. Each is tagged with its purpose, where it sits in the arc, and which axes it can move.",
    prompt:"Sero, question designer. Build questions that open something real — not fish for validation.",
    file:"prompts/generate-questions.md",
    data:pj({ questions:[
      { label:"Communication challenges", purpose:"competency", stage:"anchor",
        axis_effects:[{ axis:"clarity", delta:3 }] },
      { label:"Future role vision", purpose:"topic", stage:"aspiration",
        axis_effects:[{ axis:"growth", delta:3 }] }
    ]}),
    dataLab:"Sample (8–12 total)"
  },
  {
    emoji:"🔁", step:"Step 6 — Stage 04", title:"The live questioning loop",
    one:"The heart of it: ask → score → re-plan, every turn.",
    cin:["Last answer","Axis state"], cout:["Deltas","New queue"],
    plain:"Runs once per question. After each answer it does two jobs: score the answer on the axes, then re-plan the queue. Here 'today is fine' was flagged SHALLOW — no points, and a follow-up was added. No silent guessing.",
    prompt:"Sero's live planner. After each answer: score it on the axes, then re-plan the queue.",
    file:"prompts/plan-turn.md",
    data:pj({
      answer:"today is fine",
      assessment:{ deltas:{}, note:"[SHALLOW] no specifics — no points" },
      new_queue:[
        "Clarify: what makes today feel like you?",
        "Agenda check",
        "Current role satisfaction"
      ]
    }),
    dataLab:"One turn"
  },
  {
    emoji:"📊", step:"Step 7 — Stage 05", title:"Final evaluation",
    one:"The whole conversation becomes a briefing you can act on.",
    cin:["Transcript","Axis scores"], cout:["Manager briefing"],
    plain:"It reads the full transcript and final scores, then writes your takeaway: the headline, what the axes mean, the blunt truth, and next actions with timing.",
    prompt:"Sero's reviewer. Turn the transcript into a briefing the manager can act on.",
    file:"prompts/final-evaluation.md",
    data:pj({
      headline:"Focused on becoming a lead; flight risk if not promoted.",
      axes:[{ id:"growth", score:5 },{ id:"engagement", score:1 },{ id:"clarity", score:1 },{ id:"wellbeing", score:0 }],
      next_actions:[
        { when:"today", action:"Name the skills needed for lead." },
        { when:"next 1:1", action:"Give a promotion timeline." }
      ]
    }),
    dataLab:"The briefing"
  }
];

function hl(j){
  return j.replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/"([^"]+)":/g,'<span class="json-key">"$1"</span>:')
    .replace(/: "([^"]*)"/g,': <span class="json-str">"$1"</span>')
    .replace(/: (-?\d+\.?\d*)/g,': <span class="json-num">$1</span>');
}

const TOTAL = STAGES.length + 1; // + overview card

function dots(active){
  let s = '<div class="dots">';
  for (let i=0;i<TOTAL;i++) s += `<a href="#c${i}" class="${i===active?'on':''}"></a>`;
  return s + '</div>';
}
function nav(i){
  const back = `<a class="navbtn ${i===0?'off':''}" href="#c${i-1}">‹ Back</a>`;
  const next = `<a class="navbtn next ${i===TOTAL-1?'off':''}" href="#c${i+1}">Next ›</a>`;
  return `<div class="nav">${back}${dots(i)}${next}</div>`;
}

function overviewCard(){
  const axes = AXES.map(a=>`
    <div class="axis">
      <div class="n">${a.n}</div>
      <div class="v" style="color:var(${a.c})">${a.v>0?'+':''}${a.v}</div>
      <div class="m"><span style="width:${Math.round(((a.v+3)/8)*100)}%;background:var(${a.c})"></span></div>
    </div>`).join("");
  return `
    <section class="card" id="c0">
      <div class="cardtop">
        <div class="step">The run</div>
        <h2>Toby · Growth 1:1</h2>
        <p class="one">7 stages turn one short note into a briefing.</p>
      </div>
      <div class="cardbody">
        <div class="box plain">
          <div class="lab">Your note</div>
          <p>“He wants to become a lead but his communication methods suck.”</p>
        </div>
        <div class="lab" style="font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;font-weight:700;color:var(--faint);margin-bottom:6px;">Final read on the four axes</div>
        <div class="axes">${axes}</div>
        <p class="note">Tap <b>Next ›</b> (or a dot) to walk each stage. Nothing to scroll.</p>
      </div>
      ${nav(0)}
    </section>`;
}

function stageCard(s, i){
  const idx = i + 1; // overview is 0
  const chips = s.cin.map(t=>`<span class="chip in">⬇ ${t}</span>`).join("")
              + s.cout.map(t=>`<span class="chip out">⬆ ${t}</span>`).join("");
  const promptBox = s.prompt ? `
    <div class="box prompt">
      <div class="lab">📜 Prompt it sends</div>
      <div class="file">${s.file}</div>
      <p style="font-size:13px;color:var(--muted)">${s.prompt}</p>
    </div>` : "";
  const dataBox = s.data ? `
    <div class="box data">
      <div class="lab">📦 ${s.dataLab}</div>
      <pre>${hl(s.data)}</pre>
    </div>` : "";
  return `
    <section class="card" id="c${idx}">
      <div class="cardtop">
        <div class="step">${s.step}</div>
        <h2>${s.emoji} ${s.title}</h2>
        <p class="one">${s.one}</p>
      </div>
      <div class="cardbody">
        <div class="chips">${chips}</div>
        <div class="box plain"><div class="lab">In plain English</div><p style="font-size:14px">${s.plain}</p></div>
        ${promptBox}${dataBox}
      </div>
      ${nav(idx)}
    </section>`;
}

document.getElementById("deck").innerHTML =
  overviewCard() + STAGES.map((s,i)=>stageCard(s,i)).join("");
</script>
</body>
</html>
