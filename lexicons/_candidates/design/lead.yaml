role_family: design
seniority: lead
meeting_types:
  growth:
    prefer_terms: []
    prefer_phrases:
      - political capital
      - visible strategic influence
      - cross-org decision area
      - milestones that show progress before the next cycle
      - high-ambiguity forums
      - sponsorship in rooms where priorities are set
      - leadership bet
      - leadership bets
      - two concrete leadership bets
      - priorities are set
    avoid_phrases:
      - phrase: What's the first concrete thing you want to do before we next meet?
        reason: It was skipped, suggesting the conversation needs a tighter contract
          prompt tied to decision ownership and sponsorship.
        better_as: What are the two named leadership bets for this half, and which
          cross-org decision owner/room will you have access to by next 1:1?
      - phrase: What kind of sponsorship would actually move the needle for you here?
        reason: The answer landed on milestones, not sponsorship mechanics; the question
          may be too open-ended for this blocker.
        better_as: What specific air cover, introductions, or room access will you
          get—and how will we measure it before the next cycle?
      - phrase: milestones…before the next cycle, not only retrospective feedback
        reason: If the plan stays retrospective, it won’t convert leadership bets into
          visible strategic influence.
        better_as: What pre-cycle proof will show progress in the forum before the next
          cycle?
      - phrase: What kind of air cover would let you take a more visible position?
        reason: It can stay abstract unless it forces decision ownership + sponsorship
          mapping.
        better_as: For the decision you’ll own, who will sponsor you in the
          priorities-setting room—and what air-cover commitment will they make?
      - phrase: What kind of sponsorship would actually change the way your work lands
          here?
        reason: It elicited a shallow, negative response focused on milestones rather
          than naming a forum-specific sponsor.
        better_as: Which priority-setting forum will you enter, and who will be your
          named sponsor there?
      - phrase: Which decisions do you want your name attached to?
        reason: Toby answered with sponsorship needs instead of committing to decision
          ownership scope.
        better_as: What exact decision will you own end-to-end (inputs, tradeoffs,
          call), and what success milestone proves it?
      - phrase: When you imagine yourself eighteen months from now, what's actually
          different?
        reason: It didn’t produce the expected forward-state detail; it stayed at
          intentions rather than a concrete decision/sponsorship plan.
        better_as: What is the one decision you will drive in the next two weeks, and
          what forum will you enter despite ambiguity?
      - phrase: retrospective feedback
        reason: Toby contrasted it with what he wants, signaling it won’t move growth
          forward.
        better_as: What forward milestones will prove your decision ownership by end of
          this half?
      - phrase: high-ambiguity forums
        reason: The employee framed these rooms as risky due to underpreparedness; keep
          the focus on sponsorship/decision ownership, not just forum avoidance.
        better_as: Which specific priority-setting rooms will you attend with
          sponsorship/air-cover, and what decision will you drive there?
      - phrase: high-ambiguity forums — what about them makes you feel underprepared?
        reason: It risks staying in feelings/avoidance; the conversation needed an
          immediate conversion to a specific forum scope and authority ask.
        better_as: Which specific forum do you want to own, and what decision authority
          + milestone will prove you’re ready?
      - phrase: Who is already backing your strategic work, and who is not yet there?
        reason: It can stay at sponsorship mapping; Toby needed named sponsorship tied
          to decision ownership and forward milestones.
        better_as: Who will sponsor the decision in the room, and what forward milestone
          will show your influence before the next cycle?
