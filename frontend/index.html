<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- interactive-widget: the on-screen keyboard shrinks the page instead of
         covering it, so the focused field + its question can scroll into view
         (Android Chrome; iOS ignores the hint). -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#f5fafd" />
    <title>Sero — 1:1 prep</title>
  </head>
  <body class="h-full bg-bg text-ink">
    <!-- Instant boot splash: the logo plays slow pong with itself while the app
         boots (the auth check takes ~0.4s warm, ~1.8s cold — nothing can render
         before it returns). Inline markup + CSS so it paints before the JS
         bundle even arrives; the CSP blocks inline <script>
         (backend/api/middleware/security-headers.ts), so the fade-out lives in
         /src/boot-splash.js, which removes this node when the first screen
         mounts. Colours are literals on purpose: design.css hasn't loaded yet. -->
    <div id="boot-splash" aria-hidden="true">
      <style>
        #boot-splash{position:fixed;inset:0;z-index:10000;display:flex;flex-direction:column;
          align-items:center;justify-content:center;gap:16px;background:#f5fafd;
          transition:opacity .45s ease;}
        #boot-splash.is-done{opacity:0;pointer-events:none;}
        #boot-splash svg{width:104px;height:104px;}
        /* The mark is a pong court: bars = hands, dot = ball. Every element is
           driven from /src/boot-splash.js — the ball rallies, the bars chase it
           on a damped spring. Static mark under reduced-motion. Corner radius
           matches the core Sero mark (sero-logo.svg: 17.2% → 8.24 on a 48 grid). */
      </style>
      <svg viewBox="0 0 48 48" aria-hidden="true" focusable="false">
        <rect width="48" height="48" rx="8.24" fill="#1f2a37"/>
        <rect class="bs-pad-l" x="9" y="12" width="6.5" height="24" rx="3.25" fill="#fff"/>
        <rect class="bs-pad-r" x="32.5" y="12" width="6.5" height="24" rx="3.25" fill="#fff"/>
        <circle class="bs-ball" cx="24" cy="18.5" r="4" fill="#fff"/>
      </svg>
    </div>
    <main id="root" class="min-h-dvh"></main>
    <script type="module" src="/src/boot-splash.js"></script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
