<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Engine Run — How it works</title>
<style>
  :root{
    --bg:#0e1116; --card:#1b212b; --line:#2b3442; --text:#e8edf4;
    --muted:#9aa7b8; --faint:#6b7787; --accent:#6ea8fe; --accent-soft:#1d2a44;
    --green:#58c98a; --purple:#b08cf0; --amber:#e3b341;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; max-width:100%;}
  html,body{margin:0; padding:0; height:100%; -webkit-text-size-adjust:100%;}
  body{
    background:var(--bg); color:var(--text); overflow:hidden; touch-action:none;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.5;
  }
  .app{position:fixed; inset:0; display:flex; flex-direction:column; height:100dvh; overflow:hidden;}

  .bar{
    flex:0 0 auto; text-align:center; background:#11151c; border-bottom:1px solid var(--line);
    padding:calc(10px + env(safe-area-inset-top,0px)) 14px 9px;
  }
  .bar .t{font-size:16px; font-weight:800;}
  .bar .s{font-size:11.5px; color:var(--muted);}

  .deck{position:relative; flex:1 1 auto; min-height:0;}
  .card{
    position:absolute; inset:0; display:flex; flex-direction:column;
    padding:16px 16px calc(12px + env(safe-area-inset-bottom,0px));
    opacity:0; visibility:hidden;
  }
  .card:target{opacity:1; visibility:visible; z-index:2;}
  .deck:not(:has(:target)) #c0{opacity:1; visibility:visible; z-index:2;}

  .step{font-size:11px; letter-spacing:.08em; text-transform:uppercase; font-weight:700; color:var(--faint);}
  h2{margin:4px 0 6px; font-size:22px; line-height:1.2;}
  .one{margin:0 0 14px; font-size:14.5px; color:var(--muted);}

  .body{flex:1 1 auto; min-height:0; overflow-y:auto; -webkit-overflow-scrolling:touch;}

  .box{background:var(--card); border:1px solid var(--line); border-radius:13px; padding:13px; margin-bottom:11px;}
  .lab{font-size:10.5px; text-transform:uppercase; letter-spacing:.07em; font-weight:700; margin-bottom:7px;}
  .box.plain .lab{color:var(--green);}
  .box.prompt .lab{color:var(--purple);}
  .box.data .lab{color:var(--accent);}
  .box p{margin:0; font-size:14.5px;}
  .box p.sub{font-size:13px; color:var(--muted);}
  .file{font-size:10.5px; color:var(--faint); font-family:ui-monospace,monospace; margin-bottom:7px;}
  pre{
    margin:0; font-family:ui-monospace,Menlo,Consolas,monospace; font-size:12px; line-height:1.55;
    color:#d6e2f0; white-space:pre-wrap; word-break:break-word; overflow:hidden;
  }
  .k{color:#9cc0ff;} .v{color:#8fd8ad;} .n{color:#e3b341;}

  .axes{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin:4px 0 12px;}
  .ax{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:10px 5px; text-align:center;}
  .ax .nm{font-size:10px; color:var(--muted); text-transform:uppercase;}
  .ax .sc{font-size:21px; font-weight:800;}
  .ax .mt{height:5px; border-radius:99px; background:#2a3442; margin-top:6px; overflow:hidden;}
  .ax .mt span{display:block; height:100%; border-radius:99px;}

  .nav{flex:0 0 auto; display:flex; align-items:center; gap:10px; padding-top:11px; margin-top:6px; border-top:1px solid var(--line);}
  .btn{
    text-decoration:none; font-size:15px; font-weight:700; color:#cfe0ff;
    background:var(--accent-soft); border:1px solid #34507f; border-radius:12px;
    padding:12px 16px; min-height:48px; display:flex; align-items:center;
  }
  .btn.next{margin-left:auto;}
  .btn.off{opacity:.3; pointer-events:none;}
  .dots{flex:1 1 auto; display:flex; justify-content:center; gap:7px; flex-wrap:wrap;}
  .dots a{width:9px; height:9px; border-radius:99px; background:#36404f;}
  .dots a.on{background:var(--accent);}
  .note{font-size:13.5px; color:var(--muted);}
  .note b{color:var(--text);}
</style>
</head>
<body>
<div class="app">
  <div class="bar">
    <div class="t">⚙️ How your engine works</div>
    <div class="s">One real run · tap <b>Next ›</b></div>
  </div>
  <div class="deck" id="deck"></div>
</div>

<script>
const AXES=[
  {nm:"Wellbeing",sc:0,c:"#58c98a"},
  {nm:"Engage",sc:1,c:"#6ea8fe"},
  {nm:"Clarity",sc:1,c:"#e3b341"},
  {nm:"Growth",sc:5,c:"#b08cf0"},
];
const pj=o=>JSON.stringify(o,null,2);

const CARDS=[
  { step:"The run", title:"Toby · Growth 1:1", one:"7 stages turn one short note into a briefing.", overview:true },
  {
    step:"Step 1 · Start", title:"📝 Your notes go in",
    one:"You tell it who the meeting's with and what's on your mind.",
    plain:"Just what you typed. This short note is the seed for everything that follows.",
    dataLab:"What you typed",
    data:pj({name:"Toby",role:"Expert UX Designer",meetingType:"Growth & career plan",notes:"Wants to be a lead but his communication is weak"})
  },
  {
    step:"Step 2 · Stage 01", title:"🎯 Find the focus points",
    one:"It picks the 2–5 topics actually worth talking about.",
    plain:"Reads your note and asks what really matters today. Each topic is tagged from your note ('signal') or 'best practice'.",
    prompt:"Sero, prep-notes assistant. Surface the few topics worth this 1:1 — not a checklist.",
    file:"prompts/generate-focus-points.md",
    dataLab:"What it returns",
    data:pj({focus_points:[{label:"Communication for a lead role",source:"signal"},{label:"Skills for the step up",source:"best_practice"},{label:"Feedback on his potential",source:"best_practice"}]})
  },
  {
    step:"Step 3 · Stage 01b", title:"🧭 Your prep briefing",
    one:"A quick game-plan so you walk in grounded.",
    plain:"Before any questions, it hands you a one-glance briefing: the core issue, an opener you can say word-for-word, what to listen for, and a good outcome.",
    prompt:"Sero, prep assistant. Give a tight, practical briefing so the manager walks in grounded.",
    file:"prompts/preparation.md",
    dataLab:"The briefing",
    data:pj({coreIssue:"Comms skills Toby needs to become a lead.",openingQuestion:"What communication challenges have you faced lately?",listenFor:["does he own it","has a plan","had feedback"],goodOutcome:"Agree one comms skill this quarter."})
  },
  {
    step:"Step 4 · Stage 02", title:"👋 Intro questions",
    one:"A few warm-ups, fixed per meeting type — no AI.",
    plain:"Not every step needs the model. The opening questions are hand-written per meeting type and simply loaded in.",
    dataLab:"Loaded openers",
    data:pj({aliases:["q_open_most_like_yourself","q_intro_agenda_check","q_intro_growth_direction"]})
  },
  {
    step:"Step 5 · Stage 03", title:"💡 Question bank",
    one:"8–12 tailored questions around the focus points.",
    plain:"It designs the real questions for this person. Each is tagged with its purpose, where it sits in the arc, and which axes it can move.",
    prompt:"Sero, question designer. Build questions that open something real — not fish for validation.",
    file:"prompts/generate-questions.md",
    dataLab:"Sample (8–12 total)",
    data:pj({questions:[{label:"Communication challenges",purpose:"competency",stage:"anchor",axis_effects:[{axis:"clarity",delta:3}]},{label:"Future role vision",purpose:"topic",stage:"aspiration",axis_effects:[{axis:"growth",delta:3}]}]})
  },
  {
    step:"Step 6 · Stage 04", title:"🔁 Live questioning loop",
    one:"The heart of it: ask → score → re-plan, every turn.",
    plain:"Runs once per question. It scores the answer on the axes, then re-plans the queue. Here 'today is fine' was flagged SHALLOW — no points, and a follow-up was added. No silent guessing.",
    prompt:"Sero's live planner. After each answer: score it on the axes, then re-plan the queue.",
    file:"prompts/plan-turn.md",
    dataLab:"One turn",
    data:pj({answer:"today is fine",assessment:{deltas:{},note:"[SHALLOW] no specifics — no points"},new_queue:["Clarify: what makes today feel like you?","Agenda check","Current role satisfaction"]})
  },
  {
    step:"Step 7 · Stage 05", title:"📊 Final evaluation",
    one:"The whole conversation becomes a briefing you act on.",
    plain:"It reads the full transcript and final scores, then writes your takeaway: the headline, what the axes mean, the blunt truth, and next actions with timing.",
    prompt:"Sero's reviewer. Turn the transcript into a briefing the manager can act on.",
    file:"prompts/final-evaluation.md",
    dataLab:"The briefing",
    data:pj({headline:"Focused on becoming a lead; flight risk if not promoted.",axes:[{id:"growth",score:5},{id:"engagement",score:1},{id:"clarity",score:1},{id:"wellbeing",score:0}],next_actions:[{when:"today",action:"Name the skills needed for lead."},{when:"next 1:1",action:"Give a promotion timeline."}]})
  }
];

const hl=j=>j.replace(/&/g,"&amp;").replace(/</g,"&lt;")
  .replace(/"([^"]+)":/g,'<span class="k">"$1"</span>:')
  .replace(/: "([^"]*)"/g,': <span class="v">"$1"</span>')
  .replace(/: (-?\d+\.?\d*)/g,': <span class="n">$1</span>');

const T=CARDS.length;
const dots=a=>{let s='<div class="dots">';for(let i=0;i<T;i++)s+=`<a href="#c${i}" class="${i===a?'on':''}"></a>`;return s+'</div>';};
const nav=i=>`<div class="nav"><a class="btn ${i===0?'off':''}" href="#c${i-1}">‹ Back</a>${dots(i)}<a class="btn next ${i===T-1?'off':''}" href="#c${i+1}">Next ›</a></div>`;

function body(c){
  if(c.overview){
    const ax=AXES.map(a=>`<div class="ax"><div class="nm">${a.nm}</div><div class="sc" style="color:${a.c}">${a.sc>0?'+':''}${a.sc}</div><div class="mt"><span style="width:${Math.round(((a.sc+3)/8)*100)}%;background:${a.c}"></span></div></div>`).join("");
    return `<div class="body">
      <div class="box plain"><div class="lab">Your note</div><p>“He wants to become a lead but his communication methods suck.”</p></div>
      <div class="lab" style="color:var(--faint)">Final read · four axes</div>
      <div class="axes">${ax}</div>
      <p class="note">Tap <b>Next ›</b> or a dot to walk each stage. Nothing to scroll.</p>
    </div>`;
  }
  const p=c.prompt?`<div class="box prompt"><div class="lab">📜 Prompt it sends</div><div class="file">${c.file}</div><p class="sub">${c.prompt}</p></div>`:"";
  const d=c.data?`<div class="box data"><div class="lab">📦 ${c.dataLab}</div><pre>${hl(c.data)}</pre></div>`:"";
  return `<div class="body"><div class="box plain"><div class="lab">In plain English</div><p>${c.plain}</p></div>${p}${d}</div>`;
}

document.getElementById("deck").innerHTML = CARDS.map((c,i)=>`
  <section class="card" id="c${i}">
    <div class="step">${c.step}</div>
    <h2>${c.title}</h2>
    <p class="one">${c.one}</p>
    ${body(c)}
    ${nav(i)}
  </section>`).join("");
</script>
</body>
</html>
