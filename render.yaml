# Render blueprint — how Render builds and runs Sero.
# Render reads this file when you create a "Blueprint" from the repo.
# One free Node web service, Frankfurt. Every push to `main` auto-deploys.
#
# Secrets are marked `sync: false` — Render asks you for the values ONCE in the
# dashboard and stores them there; they never live in this file or in git.
# See RENDER_SETUP.md for the click-by-click.

services:
  - type: web
    name: sero
    runtime: node
    region: frankfurt
    plan: free
    # --include=dev on purpose: the build (vite) and the start command (cross-env)
    # both live in devDependencies. Plain `npm ci` under NODE_ENV=production skips
    # them and the build dies.
    # build:customer on purpose: the public deploy serves ONLY the customer app
    # (frontend/dist) — the admin app never ships (frontend-admin-split Phase 4,
    # Carl's call 2026-07-08). server.ts serves frontend/dist in production.
    buildCommand: npm ci --include=dev && npm run build:customer
    startCommand: npm start
    # Render pings this until it returns 200 before sending traffic (and to know the
    # app is alive). Public, no auth — added in Phase 1.
    healthCheckPath: /api/v1/health
    # Re-deploy on every commit pushed to main.
    autoDeployTrigger: commit
    envVars:
      # Plain values — safe to keep in git.
      - key: NODE_ENV
        value: production
      - key: APP_ENV
        value: live
      # The email sender — not a secret, safe in git. Must be on a Resend-verified
      # domain (seroapp.com — verified in Resend; matches the "SeroApp-New" key).
      - key: EMAIL_FROM
        value: Sero <notifications@seroapp.com>
      # Public origin for clickable /join links in invite emails.
      - key: APP_BASE_URL
        value: https://sero-obwq.onrender.com
      # Secrets — Render prompts for each once, in the dashboard. Never in git.
      # ⚠️ DATABASE_URL must be the "Sero Live" Neon URL (the LIVE_DATABASE_URL
      #    value from your .env), NOT your local one. See RENDER_SETUP.md.
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPERADMIN_EMAILS
        sync: false
      # Resend API key for transactional email (signup alerts, invite links).
      # Unset = emails are skipped, the app still runs.
      - key: EMAIL_API_KEY
        sync: false
