# Render blueprint — how Render builds and runs Sero.
# Render reads this file when you create a "Blueprint" from the repo.
# One free Node web service, Frankfurt. Every push to `main` auto-deploys.
#
# Secrets are marked `sync: false` — Render asks you for the values ONCE in the
# dashboard and stores them there; they never live in this file or in git.
# See RENDER_SETUP.md for the click-by-click.

services:
  - type: web
    name: sero
    runtime: node
    region: frankfurt
    plan: free
    # --include=dev on purpose: the build (vite) and the start command (cross-env)
    # both live in devDependencies. Plain `npm ci` under NODE_ENV=production skips
    # them and the build dies.
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    # Render pings this until it returns 200 before sending traffic (and to know the
    # app is alive). Public, no auth — added in Phase 1.
    healthCheckPath: /api/v1/health
    # Re-deploy on every commit pushed to main.
    autoDeployTrigger: commit
    envVars:
      # Plain values — safe to keep in git.
      - key: NODE_ENV
        value: production
      - key: APP_ENV
        value: live
      # Secrets — Render prompts for each once, in the dashboard. Never in git.
      # ⚠️ DATABASE_URL must be the "Sero Live" Neon URL (the LIVE_DATABASE_URL
      #    value from your .env), NOT your local one. See RENDER_SETUP.md.
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPERADMIN_EMAILS
        sync: false
